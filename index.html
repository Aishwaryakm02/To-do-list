<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f5e6d3; /* lightest brown */
      font-family: Arial, sans-serif;
      color: #4b2e2e; /* dark brown */

      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 400px;
      background: #fffaf5;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    h1 {
      color: #4b2e2e;
      font-family: cursive;
    }

    p {
      font-size: 0.9rem;
    }

    input {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background-color: #6b3e3e;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    ul {
      list-style: none;
      padding: 0;
      margin-top: 15px;
    }

    li {
      background: #f0e0d6;
      padding: 10px;
      margin-top: 8px;
      border-radius: 5px;
      display: flex;
      justify-content: space-between;
    }

    li button {
      width: auto;
      padding: 5px;
      background: #8b0000;
      font-size: 0.8rem;
    }

    .hidden {
      display: none;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Welcome Section -->
  <div id="welcomeSection">
    <h1>👋 Welcome!</h1>
    <p>This is your personal To-Do List app.</p>
    <p>It helps you stay organized and manage your daily tasks efficiently.</p>
    <p><b>Don’t skip your to-do list!</b> It keeps you focused and productive 😊</p>

    <input type="text" id="nameInput" placeholder="Enter your name">
    <button onclick="startApp()">Start</button>
  </div>

  <!-- To-Do Section -->
  <div id="todoSection" class="hidden">
    <h1 id="userTitle"></h1>

    <input type="text" id="taskInput" placeholder="Enter a task">
    <button onclick="addTask()">Add Task</button>

    <ul id="taskList"></ul>
  </div>

</div>

<script>
  let userName = "";

  function startApp() {
    userName = document.getElementById("nameInput").value;

    if (userName === "") {
      alert("Please enter your name");
      return;
    }

    document.getElementById("welcomeSection").classList.add("hidden");
    document.getElementById("todoSection").classList.remove("hidden");

    document.getElementById("userTitle").innerText =
      userName + ", enter your To-Do List 📝";
  }

  function addTask() {
    let input = document.getElementById("taskInput");
    let task = input.value;

    if (task === "") {
      alert("Enter a task!");
      return;
    }

    let li = document.createElement("li");
    li.innerText = task;

    let deleteBtn = document.createElement("button");
    deleteBtn.innerText = "X";
    deleteBtn.onclick = function () {
      li.remove();
    };

    li.appendChild(deleteBtn);
    document.getElementById("taskList").appendChild(li);

    input.value = "";
  }
</script>

</body>
</html>
